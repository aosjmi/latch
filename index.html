<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Latch</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;height:100dvh;width:100vw;overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}
video,img{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
canvas{display:none}
</style>
</head>
<body>
<video autoplay playsinline muted></video>
<img id="held" style="display:none">
<canvas id="c"></canvas>
<script>
const video=document.querySelector('video');
const img=document.getElementById('held');
const canvas=document.getElementById('c');
let locked=false;
let wl=null;

navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920}},audio:false}).then(s=>{video.srcObject=s});

async function hold(){if(locked)return;
const w=video.videoWidth,h=video.videoHeight;if(!w)return;
canvas.width=w;canvas.height=h;
canvas.getContext('2d').drawImage(video,0,0);
img.src=canvas.toDataURL('image/jpeg',0.92);
img.style.display='block';
locked=true;
try{if('wakeLock'in navigator)wl=await navigator.wakeLock.request('screen')}catch(e){}}

function reset(){img.style.display='none';img.src='';locked=false;
if(wl){wl.release();wl=null}}

document.addEventListener('click',()=>{locked?reset():hold()});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&locked&&'wakeLock'in navigator)navigator.wakeLock.request('screen').then(l=>wl=l).catch(()=>{})});
</script>
</body>
</html>
